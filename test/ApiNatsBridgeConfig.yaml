# ============================================================
# ApiNatsBridge 設定檔 — HTTP 請求轉發至 NATS 微服務
# ============================================================

# --- HTTP API 伺服器設定 (nyaapiserver.HttpAPIServerConfig) ---
httpapiserver_config:
  httpapiserver_host: "127.0.0.1"
  httpapiserver_port: 9080

  # TLS 憑證：兩者皆填時啟用 HTTPS，留空則使用 HTTP
  httpapiserver_tls_cert_file: ""
  httpapiserver_tls_key_file: ""

  # 逾時設定 (秒)
  httpapiserver_read_timeout: 5
  httpapiserver_write_timeout: 30
  httpapiserver_idle_timeout: 60

  # IP 限流
  httpapiserver_enable_rate_limit: true
  httpapiserver_limit_requests: 50
  httpapiserver_limit_window: 1
  httpapiserver_block_duration: 600

# --- NATS 用戶端設定 (nyanats.NatsConfig) ---
nats_config:
  nats_server_host: 127.0.0.1
  nats_server_port: 4222

  # 連線認證 (留空則不啟用認證)
  nats_user: webapi
  nats_password: Ohr1biolei4aeD3eu7isaeyie9di4uuf

  nats_client_name: ApiNatsBridgeTest

  # 重連策略
  nats_max_reconnects: 5
  nats_reconnect_wait: 2
  nats_connect_timeout: 10

  # AES 對稱加密：長度必須為 16 / 24 / 32 字節
  # 留空則明文傳輸；可使用 nyanats.GenerateRandomKey() 產生隨機金鑰
  nats_encryption_key: "GLOBAL_BACKUP_KEY_32_CHARS_LONG!"

  # 個別主題專用金鑰（優先於全域金鑰）
  # 設為 "" 表示該主題明文傳輸
  nats_theme_keys:
    "theme.dedicated": "DEDICATED_SECRETKEY_32_CHAR_LONG"
    "theme.plain": ""

# --- 橋接層設定 ---
bridge:
  # 日誌輸出設定
  log:
    stdout: true # 是否同時輸出到控制台，設為 false 則僅寫入檔案
    debug: true # 是否啟用除錯等級日誌，設為 false 則僅輸出 Info 及以上等級
    overwrite: false # 是否使用覆蓋模式，設為 true 則啟動時清空現有日誌檔案，設為 false 或不提供則僅追加
    color: true # 是否使用彩色控制台輸出，設為 true 或不提供則使用彩色，設為 false 則純文字
    files:
      # 各模組獨立日誌檔案路徑，可分別設定
      # 留空或不填則該模組不寫入檔案
      main: "logs/main.log" # 主流程日誌
      bridge: "logs/bridge.log" # 橋接路由與轉發日誌
      http: "logs/http.log" # HTTP 請求日誌
      nats: "logs/nats.log" # NATS 用戶端事件日誌
      httpstat: "logs/httpstat.log" # HTTP 伺服器執行統計日誌
      module: "logs/module.log" # 通用模組日誌（如 /ping）

  # 時區，影響所有日誌時間戳，支援 IANA 時區名稱（如 Asia/Shanghai、America/New_York）或小時偏移（如 8、-5）
  timezone: "Asia/Shanghai"

  # CDN 服務商傳遞真實 IP 的專屬標頭清單, 若 CDN 僅使用 X-Forwarded-For，則無需加入
  cdnheader:
    - "CF-Connecting-IP" # Cloudflare
    - "True-Client-IP" # Akamai / Cloudflare Enterprise
    - "Fastly-Client-IP" # Fastly
    - "CloudFront-Viewer-Address" # AWS CloudFront
    - "CDN-Viewer-IP" # Google Cloud CDN
    - "X-Azure-ClientIP" # Azure CDN / Microsoft CDN
    - "Incap-Client-IP" # Imperva / Incapsula
    - "X-Sucuri-ClientIP" # Sucuri
    - "X-SP-Forwarding-IP" # StackPath
    - "Ali-Cdn-Real-Ip" # 阿里雲 CDN / DCDN / 全站加速
    - "Ar-Real-IP" # ArvanCloud

  # 允許接收錯誤詳細資訊的 IP 白名單（用於開發除錯）
  error_detail_ips:
    - "127.0.0.1"
    - "::1"

  # 自動為用戶端 Cookie 寫入 UUID 的鍵名（留空或不填則不啟用）
  cookie_uuid_key: "brid"

  # 請求欄位長度限制（0 或省略表示不限制）
  limits:
    path:
      max_length: 2048 # 請求路徑最大長度（位元組）
    headers:
      max_count: 64 # 標頭最大筆數
      max_key_length: 256 # 標頭名稱最大長度（位元組）
      max_value_length: 4096 # 標頭值最大長度（位元組）
    cookies:
      max_count: 32 # Cookie 最大筆數
      max_key_length: 256 # Cookie 名稱最大長度（位元組）
      max_value_length: 4096 # Cookie 值最大長度（位元組）
    params:
      max_count: 64 # 參數最大筆數
      max_key_length: 256 # 參數名稱最大長度（位元組）
      max_value_length: 4096 # 參數值最大長度（位元組）
    body:
      max_length: 1048576 # 請求本文最大長度（位元組，此例為 1MB）
  response_limits: # 回應欄位長度限制（可選，會被路由級別覆蓋）
    body:
      max_length: 1048576 # 回應本文最大長度（位元組，此例為 1MB）
    headers:
      max_count: 64 # 回應標頭最大筆數
      max_key_length: 256 # 回應標頭名稱最大長度（位元組）
      max_value_length: 4096 # 回應標頭值最大長度（位元組）

# --- 路由轉發規則 ---
routes:
  - path: "/ping" # HTTP 請求路徑
    nats_subject: "ping_req" # 轉發至 NATS 的 Subject
    methods: ["GET"] # 允許的 HTTP 方法
    content_type: "" # 要求的 Content-Type（空=不檢查）
    timeout: 10 # NATS 等待微服務回應的逾時秒數
    return_fields: # 返回給 NATS 的欄位（可選，可多選）
      - method #   留空陣列或不提供則返回所有，只留一个则返回它的内容本身
      - path #   可選值：本條就是所有可選值
      - headers
      - cookies
      - remote_addr
      - ip
      - params
      - body
  - path: "/test" # HTTP 請求路徑
    nats_subject: "test_req" # 轉發至 NATS 的 Subject
    methods: ["GET", "POST"] # 允許的 HTTP 方法
    content_type: "application/json" # 要求的 Content-Type 前綴
    timeout: 60 # NATS 等待微服務回應的逾時秒數
    return_fields: # 返回給 NATS 的欄位（可選，可多選）
      - method #   留空陣列或不提供則返回所有，只留一个则返回它的内容本身
      - path
      - headers
      - cookies
      - remote_addr
      - ip
      - params
      - body
    # 路由級別長度限制（可選，每項皆可選，會覆蓋 bridge.limits 的對應欄位）
    limits:
      body:
        max_length: 65536 # 此路由僅接受最大 64KB 的請求本文
      headers:
        max_count: 32 # 此路由僅接受最多 32 個標頭
    schema_body: # JSON Schema 校驗規則（可選）
      root_type: object #   控制鍵：根節點類型
      strict: true #   控制鍵：嚴格模式，拒絕未知欄位
      required: #   JSON Schema：必須包含的鍵
        - message
      properties: #   JSON Schema：欄位定義
        message:
          type: string
    response_limits: # 回應資料長度限制（可選，每項皆可選）
      body:
        max_length: 65536
    response_schema_body: # 回應 JSON Schema 校驗規則（可選）
      root_type: object
      strict: true
      required:
        - status
      properties:
        status:
          type: string
        result:
          type: string
  - path: "/test_form" # HTTP 請求路徑（表單提交測試）
    nats_subject: "test_req" # 轉發至 NATS 的 Subject
    methods: ["POST"] # 允許的 HTTP 方法
    content_type: "application/x-www-form-urlencoded"
    timeout: 60 # NATS 等待微服務回應的逾時秒數
    return_fields: # 返回給 NATS 的欄位（可選，可多選）
      - method #   留空陣列或不提供則返回所有，只留一个则返回它的内容本身
      - path
      - headers
      - cookies
      - remote_addr
      - ip
      - params
      - body
    schema_body: # JSON Schema 校驗規則
      root_type: object
      strict: true
      required:
        - message
      properties:
        message:
          type: string
