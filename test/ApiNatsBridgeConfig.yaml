# ============================================================
# ApiNatsBridge 配置文件 — HTTP 请求转发至 NATS 微服务
# ============================================================

# --- HTTP API 服务器配置 (nyaapiserver.HttpAPIServerConfig) ---
httpapiserver_config:
  # HTTP 服务器监听的 IP 地址，设为 0.0.0.0 可接受所有接口的连接
  httpapiserver_host: "127.0.0.1"
  # HTTP 服务器监听的端口号
  httpapiserver_port: 9080

  # TLS 证书：两者皆填时启用 HTTPS，留空则使用 HTTP
  # TLS 证书文件路径（PEM 格式）
  httpapiserver_tls_cert_file: ""
  # TLS 私钥文件路径（PEM 格式）
  httpapiserver_tls_key_file: ""

  # 超时设置 (秒)
  # 读取完整请求的最大等待时间（秒），防止慢速客户端占用连接
  httpapiserver_read_timeout: 5
  # 写入响应的最大等待时间（秒），包含处理时间
  httpapiserver_write_timeout: 30
  # Keep-Alive 连接的最大闲置时间（秒），超时后自动断开
  httpapiserver_idle_timeout: 60

  # IP 限流
  # 是否启用基于 IP 的请求限流
  httpapiserver_enable_rate_limit: true
  # 时间窗口内单个 IP 允许的最大请求次数
  httpapiserver_limit_requests: 50
  # 限流时间窗口大小（秒）
  httpapiserver_limit_window: 1
  # 超出限制后封禁该 IP 的持续时间（秒）
  httpapiserver_block_duration: 600

# --- NATS 客户端配置 (nyanats.NatsConfig) ---
nats_config:
  # NATS 服务器的 IP 地址或主机名
  nats_server_host: 127.0.0.1
  # NATS 服务器的端口号（默认 4222）
  nats_server_port: 4222

  # 连接认证 (留空则不启用认证)
  # NATS 连接使用的用户名
  nats_user: webapi
  # NATS 连接使用的密码
  nats_password: Ohr1biolei4aeD3eu7isaeyie9di4uuf

  # NATS 客户端名称，用于服务器端识别此连接
  nats_client_name: ApiNatsBridgeTest

  # 重连策略
  # 与 NATS 服务器断线后的最大重连次数，-1 表示无限重连
  nats_max_reconnects: 5
  # 每次重连尝试之间的等待时间（秒）
  nats_reconnect_wait: 2
  # 初始连接的最大等待时间（秒）
  nats_connect_timeout: 10

  # AES 对称加密：长度必须为 16 / 24 / 32 字节（对应 AES-128 / AES-192 / AES-256）
  # 留空则明文传输；可使用 nyanats.GenerateRandomKey() 生成随机密钥
  # 全局加密密钥，所有未指定专用密钥的主题皆使用此密钥
  nats_encryption_key: "GLOBAL_BACKUP_KEY_32_CHARS_LONG!"

  # 个别主题专用密钥（优先于全局密钥）
  # 主题名称到专用密钥的映射表
  # 设为 "" 表示该主题明文传输
  nats_theme_keys:
    # 主题 theme.dedicated 使用的专用加密密钥
    "theme.dedicated": "DEDICATED_SECRETKEY_32_CHAR_LONG"
    # 主题 theme.plain 强制使用明文传输（不加密）
    "theme.plain": ""

# --- 桥接层配置 ---
bridge:
  # 多语言配置（可选值：en、zh、zh_Hant、ja）
  language:
    # 日志输出语言
    log: "zh"
    # HTTP 响应错误消息语言
    http: "en"
    # 命令行相关消息语言
    cli: "zh"

  # 日志输出配置
  log:
    # 是否同时输出到控制台，设为 false 则仅写入文件
    stdout: true
    # 是否启用调试模式，设为空数组 [] 则仅输出 Info 及以上等级日志
    # 可选值：
    #   HTTP  = 输出完整 HTTP 请求与响应通信内容，包括标头、Cookie 等
    #   NATS  = 输出完整 NATS 通信内容，标明通信方向和主题
    #   LIMIT = 输出所有被规则拦截的请求的违规信息与内容
    debug: []
    # 是否使用覆盖模式，设为 true 则启动时清空现有日志文件，设为 false 或不提供则仅追加
    overwrite: true # 是否使用覆蓋模式，設為 true 則啟動時清空現有日誌檔案，設為 false 或不提供則僅追加
    color: true # 是否使用彩色控制台輸出，設為 true 或不提供則使用彩色，設為 false 則純文字
    status_interval_seconds: 60 # STATUS 狀態日誌的輸出間隔秒數，0 或未設定時預設 60 秒
    files:
      # 各模块独立日志文件路径，可分别配置
      # 留空或不填则该模块不写入文件
      # 主流程日志（启动、关闭、配置加载等）
      main: "logs/main.log"
      # 桥接路由与转发日志（路由匹配、NATS 发送等）
      bridge: "logs/bridge.log"
      # HTTP 请求日志（每笔请求的方法、路径、状态码等）
      http: "logs/http.log"
      # NATS 客户端事件日志（连接、断线、重连等）
      nats: "logs/nats.log"
      # HTTP 伺服器與 NATS 狀態統計日誌（定期彙整的效能指標）
      status: "logs/status.log"
      # 通用模块日志（如 /ping 等内置模块输出）
      module: "logs/module.log"

  # 时区，影响所有日志时间戳，支持 IANA 时区名称（如 Asia/Shanghai、America/New_York）或小时偏移（如 8、-5）
  timezone: "Asia/Shanghai"

  # 日志时间日期显示格式
  # Go 参考时间格式：2006-01-02 15:04:05
  #   - 设为有效格式：控制台与日志文件均使用该格式
  #   - 设为空字符串 ""：控制台不显示时间日期，日志文件仍使用默认格式
  #   - 未设定（省略此字段）：使用默认值 "2006-01-02 15:04:05"（YYYY-MM-DD HH:mm:ss）
  #   - 可被路由级别 time_format 覆盖
  # time_format: ""                      # 空字符串：控制台无时间日期
  # time_format: "2006-01-02 15:04:05"   # 默认值：YYYY-MM-DD HH:mm:ss
  # time_format: "15:04:05"              # 仅时间：HH:mm:ss
  # time_format: "01/02 15:04:05"        # 月/日 时:分:秒
  # time_format: "2006-01-02T15:04:05.000Z07:00" # ISO 8601 格式

  # CDN 服务商传递真实 IP 的专属标头列表，若 CDN 仅使用 X-Forwarded-For，则无需加入
  cdnheader:
    - "CF-Connecting-IP" # Cloudflare
    - "True-Client-IP" # Akamai / Cloudflare Enterprise
    - "Fastly-Client-IP" # Fastly
    - "CloudFront-Viewer-Address" # AWS CloudFront
    - "CDN-Viewer-IP" # Google Cloud CDN
    - "X-Azure-ClientIP" # Azure CDN / Microsoft CDN
    - "Incap-Client-IP" # Imperva / Incapsula
    - "X-Sucuri-ClientIP" # Sucuri
    - "X-SP-Forwarding-IP" # StackPath
    - "Ali-Cdn-Real-Ip" # 阿里云 CDN / DCDN / 全站加速
    - "Ar-Real-IP" # ArvanCloud

  # 允许接收错误详细信息的 IP 白名单（用于开发调试）
  error_detail_ips:
    - "127.0.0.1" # IPv4 本机地址
    - "::1" # IPv6 本机地址

  # 微服务返回 JSON 中表示 HTTP 状态码的全局默认键名（可被路由级别覆盖，留空则路由未指定时默认 200）
  # http_code_key: ""

  # 微服务返回 JSON 中表示错误码的全局默认键名（可被路由级别覆盖，留空则不启用）
  # error_code_key: ""

  # 响应正文的 JSON Schema 验证全局默认规则（可被路由级别覆盖，留空则不限制）
  # response_schema_body: {}

  # 错误响应正文的 JSON Schema 验证全局默认规则（当 error_code_key 检测到时优先使用，可被路由级别覆盖，留空则不限制）
  # response_error_schema_body: {}

  # 微服务错误信息的显示模式全局默认值（可被路由级别覆盖）
  #   0 = 不在日志文件中记录（仅保留基本的 [HTTP] 日志）
  #   1 = 在日志文件中记录并输出
  #   2 = 在日志文件中记录并输出，内容返回给白名单 IP 用户
  #   3 = 在日志文件中记录并输出，内容返回给所有用户
  #   4 = 不记录（仅保留基本的 [HTTP] 日志），内容返回给白名单 IP 用户
  #   5 = 不记录（仅保留基本的 [HTTP] 日志），内容返回给所有用户
  # error_info_show: 1

  # 请求字段长度限制（全局级别，0 或省略表示不限制，可被路由级别覆盖）
  limits:
    path:
      # 请求路径最大长度（字节）
      max_length: 2048
    headers:
      # 请求标头最大笔数
      max_count: 64
      # 请求标头名称最大长度（字节）
      max_key_length: 256
      # 请求标头值最大长度（字节）
      max_value_length: 4096
    cookies:
      # Cookie 最大笔数
      max_count: 32
      # Cookie 名称最大长度（字节）
      max_key_length: 256
      # Cookie 值最大长度（字节）
      max_value_length: 4096
    params:
      # URL 查询参数最大笔数
      max_count: 64
      # 参数名称最大长度（字节）
      max_key_length: 256
      # 参数值最大长度（字节）
      max_value_length: 4096
    body:
      # 请求正文最大长度（字节，此例为 1MB）
      max_length: 1048576
  # 响应字段长度限制（全局级别，可被路由级别覆盖）
  response_limits:
    body:
      # 响应正文最大长度（字节，此例为 1MB）
      max_length: 1048576
    headers:
      # 响应标头最大笔数
      max_count: 64
      # 响应标头名称最大长度（字节）
      max_key_length: 256
      # 响应标头值最大长度（字节）
      max_value_length: 4096

  # --- 令牌验证配置（可选，若省略则不启用令牌验证） ---
  # token:
  #   # 验证令牌用的 NATS 主题（默认值）
  #   nats_subject: "auth.token.verify"
  #   # 不需要检查令牌的 HTTP 路径白名单
  #   path_whitelist:
  #     - "/ping"
  #     - "/auth/login"
  #   # 令牌所在 HTTP 标头名称（默认值）
  #   header_name: "Authorization"
  #   # 令牌的最小长度（默认值）
  #   min_length: 10
  #   # 令牌的最大长度（默认值）
  #   max_length: 4096
  #   # tag 部分的分隔符（默认值）
  #   tag_separator: "|"
  #   # 令牌验证成功时的回传值（默认值）
  #   success_value: "0"
  #   # 等待令牌验证回应的超时秒数（默认值）
  #   timeout: 5
  #   # 令牌验证结果快取的最大笔数（默认值，达上限时清空快取）
  #   cache_max_entries: 1000
  #   # 令牌验证的最大并发请求数（默认值，超限时回传 HTTP 503）
  #   max_concurrent: 256
  #
  # # 全域转发 NATS 的最大并发请求数（0 = 不限制）
  # max_concurrent: 512
  #   # HTTP 层的最大并发请求处理数（0 = 不限制）
  # http_max_concurrent: 1024
  #
  # # 自定义回应标头（全局级别，附加到所有 HTTP 回应）
  # # 注意：Access-Control-Allow-Methods 与 Access-Control-Allow-Headers
  # #   当路由 methods 包含 OPTIONS 时会自动从路由设定产生，
  # #   无需在此手动设定；如需覆盖可在路由级别 response_headers 中指定。
  # response_headers:
  #   Access-Control-Allow-Origin: "*"
  #   X-Frame-Options: "DENY"
  #   X-Content-Type-Options: "nosniff"

# --- 路由转发规则 ---
# 每条路由定义一个 HTTP 路径如何被验证并转发到 NATS Subject
routes:
  # HTTP 请求路径（对应 ApiNatsBridgeTemplate 的 ping 服务）
  - path: "/ping"
    # 转发至 NATS 的 Subject 名称
    nats_subject: "ping_req"
    # 允许的 HTTP 方法列表（此例为所有选项）
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]
    # 要求的 Content-Type（空字符串=不检查；亦可用 application/json）
    content_type: "application/x-www-form-urlencoded"
    # NATS 等待微服务响应的超时秒数，超过则返回 504 Gateway Timeout
    timeout: 10
    # 转发到 NATS 消息中包含的字段列表（留空则传送所有字段）
    return_fields:
      - method # HTTP 请求方法（如 GET、POST）
      - path # 请求路径（如 /ping）
      - headers # 请求标头（键值对 map）
      - cookies # 请求 Cookie（键值对 map）
      - remote_addr # 远端地址（含端口，如 127.0.0.1:54321）
      - ip # 客户端 IP（已解析 CDN 标头后的真实 IP）
      - params # URL 查询参数（键值对 map）
      - body # 请求正文（原始字符串内容）
    # 此路由专用的请求限制（覆盖全局 limits）
    limits:
      path:
        # "/ping" 固定 5 字符
        max_length: 5
      body:
        # 不接收请求体（0 表示禁止携带 body）
        max_length: 0
      headers:
        # 典型请求标头数量上限
        max_count: 16
        # 最长标头名称长度（如 X-Forwarded-For = 15）
        max_key_length: 25
        # 标头值最大长度
        max_value_length: 256
      params:
        # 仅接受 1 个查询参数（timestamp）
        max_count: 1
        # "timestamp" = 9 字符
        max_key_length: 9
        # int64 正数最大值 9223372036854775807 = 19 位数
        max_value_length: 19
      cookies:
        # Cookie 最大笔数
        max_count: 4
        # Cookie 名称最大长度
        max_key_length: 8
        # UUID 格式 8-4-4-4-12 = 36 字符
        max_value_length: 36
    # 请求正文的 JSON Schema 验证（此处对应 application/x-www-form-urlencoded 的字段结构）
    schema_body:
      # 根类型为对象
      root_type: object
      # 严格模式：不允许 Schema 中未定义的字段
      strict: true
      # 允许的属性定义
      properties:
        # 字段名称 timestamp
        timestamp:
          # 字段类型为字符串
          type: string
    # 此路由专用的响应限制（覆盖全局 response_limits）
    response_limits:
      body:
        # 响应正文最大长度：{"pong":±9223372036854775808,"ip":"0000:0000:0000:0000:0000:0000:0000:0000","servertime":9223372036854775807}
        max_length: 109
      headers:
        # 仅允许 1 个响应标头（Content-Type）
        max_count: 1
        # "Content-Type" = 12 字符
        max_key_length: 12
        # "application/json; charset=utf-8" = 31 字符
        max_value_length: 31
    # 响应正文的 JSON Schema 验证（验证微服务返回的 JSON 结构）
    response_schema_body:
      # 根类型为对象
      root_type: object
      # 严格模式：不允许 Schema 中未定义的字段
      strict: true
      # 必需字段列表
      required:
        # 必须包含 pong 字段
        - pong
        # 必须包含 ip 字段
        - ip
        # 必须包含 servertime 字段
        - servertime
      # 属性定义
      properties:
        # pong 字段定义
        pong:
          # 类型为整数（时间戳响应）
          type: integer
        # ip 字段定义
        ip:
          # 类型为字符串（客户端 IP 回显）
          type: string
        # servertime 字段定义
        servertime:
          # 类型为整数（服务器系统毫秒时间戳）
          type: integer
    # 错误响应正文的 JSON Schema 验证（当 HTTP 状态码 >=400 时优先使用，未设定则沿用 response_schema_body）
    # response_error_schema_body:
    #   # 根类型为对象
    #   root_type: object
    #   # 严格模式：不允许 Schema 中未定义的字段
    #   strict: true
    #   # 必需字段列表
    #   required:
    #     # 必须包含 error 字段
    #     - error
    #   # 属性定义
    #   properties:
    #     # error 字段定义
    #     error:
    #       # 类型为字符串（错误描述）
    #       type: string
    # 微服务返回 JSON 中表示 HTTP 状态码的键名（此路由会以此检测 BridgeResponse 格式，不指定则默认 200）
    # http_code_key: ""
    # 微服务返回 JSON 中表示错误码的键名（检测到此键时触发 response_error_schema_body 验证）
    # error_code_key: ""
    # 微服务错误信息的显示模式（覆盖 bridge 层的全局设定）
    #   0 = 不在日志文件中记录（仅保留基本的 [HTTP] 日志）
    #   1 = 在日志文件中记录并输出
    #   2 = 在日志文件中记录并输出，内容返回给白名单 IP 用户
    #   3 = 在日志文件中记录并输出，内容返回给所有用户
    #   4 = 不记录（仅保留基本的 [HTTP] 日志），内容返回给白名单 IP 用户
    #   5 = 不记录（仅保留基本的 [HTTP] 日志），内容返回给所有用户
    # error_info_show: 0
    # 此路由专用的日志时间日期显示格式（覆盖 bridge 层的全局设定）；空字符串表示控制台不显示时间但日志文件仍记录
    # time_format: ""                      # 空字符串：控制台无时间日期
    # time_format: "2006-01-02 15:04:05"   # 默认值：YYYY-MM-DD HH:mm:ss
    # 此路由的最大并发 NATS 转发请求数（0 = 不限制，保护特定后端微服务）
    # max_concurrent: 64
    # 此路由专用的自定义回应标头（覆盖自动 CORS 与 bridge 层全局设定）
    # 例如要限定 Origin 或覆蓋自動產生的 Allow-Methods：
    # response_headers:
    #   Access-Control-Allow-Origin: "https://example.com"
    #   X-Custom-Header: "custom-value"
