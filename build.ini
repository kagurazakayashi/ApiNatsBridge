[project]
; 自訂輸出名稱，留空則從 go.mod 自動偵測
name = api-nats-bridge
; 應用版本號，影響輸出目錄命名，留空則從 winres/winres.json 自動偵測
; appver =
; 應用描述（用於 Linux .desktop 檔案與 macOS Info.plist）
appdesc = HTTP-to-NATS gateway bridge
; 通用名稱（用於桌面條目顯示）
appgeneric = Api Nats Bridge

[platform]
; 目標平台 GOOS/GOARCH 模式，逗號分隔，支援 * 萬用字元（如 "windows/*"）
target = windows/amd64,windows/arm64,linux/amd64,linux/arm64,darwin/amd64,darwin/arm64

[build]
; 強制所有平台啟用 CGO 交叉編譯（on / off）
cgo = off
; 平行建置任務數（0 = CPU 核心數，-1 = 序列模式）
jobs = 0
; 建置前執行 go vet 靜態分析（on / off）
analyze = on
; 建置前執行 l10n 多語系生成（on / off）
l10n = on
; 專案根目錄（此處由 CLI 傳入：build.bat 用 "../"、build.sh 無需指定）
; project-dir =

[desktop]
; Linux 桌面條目分類，分號分隔（如 "Network;FileTransfer"）
appcategory = Development
; 圖示檔案路徑（相對於專案根目錄）
appicon = ico/icon.png
; macOS Bundle Identifier（如 "com.example.app"），留空則從 go.mod 自動推導
appidentifier = com.tongdy.apinatsbridge
; macOS 應用分類（UTI 格式，如 "public.app-category.utilities"）
appmacoscategory = public.app-category.developer-tools
